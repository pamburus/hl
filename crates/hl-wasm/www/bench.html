<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>hl WASM bench</title>
    <link rel="stylesheet" href="index.css" />
    <style>
      #bench-results {
        padding: 12px 16px;
        font-family: var(--row-font);
        font-size: 13px;
        white-space: pre;
        overflow: auto;
        flex: 1;
      }
      .bench-run {
        border-bottom: 1px solid #333;
        padding-bottom: 10px;
        margin-bottom: 10px;
      }
      .bench-run h3 {
        margin: 0 0 6px;
        font: 600 13px ui-sans-serif, system-ui, sans-serif;
        color: var(--accent);
      }
      #file-input {
        color: var(--fg);
      }
      .bench-row {
        display: flex;
        gap: 8px;
      }
      .bench-row .k {
        color: #888;
        min-width: 11em;
      }
    </style>
  </head>
  <body>
    <header id="toolbar">
      <input id="url-input" type="url" placeholder="Log URL (must be CORS-friendly)…" />
      <input id="file-input" type="file" />
      <label style="font-size:12px;color:#888;">
        Iters
        <input id="iters" type="number" value="5" min="1" max="50" style="width:5em;background:#1f2125;color:var(--fg);border:1px solid #444;padding:2px 4px;border-radius:3px;" />
      </label>
      <button id="run-btn" type="button">Run bench</button>
      <span id="status">Loading WASM…</span>
    </header>
    <main id="bench-results"></main>
    <script type="module" src="bench.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>hl viewer</title>
    <link rel="stylesheet" href="/viewer.css" />
    <link rel="stylesheet" href="/themes/dark.css" id="theme-stylesheet" />
  </head>
  <body>
    <header id="toolbar">
      <input
        id="url-input"
        type="url"
        placeholder="Public log URL (the server will fetch it on your behalf)…"
        autocomplete="off"
        spellcheck="false"
      />
      <button id="open-btn" type="button">Open</button>
      <span id="status">Idle</span>
    </header>
    <main id="viewport" tabindex="0">
      <div id="spacer">
        <div id="rows"></div>
      </div>
    </main>
    <script type="module" src="/viewer.js"></script>
  </body>
</html>

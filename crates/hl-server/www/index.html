<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>hl viewer</title>
    <link rel="stylesheet" href="/viewer.css" />
    <link rel="stylesheet" href="/themes/dark.css" id="theme-stylesheet" />
  </head>
  <body>
    <header id="toolbar">
      <input
        id="url-input"
        type="url"
        placeholder="Public log URL (the server will fetch it on your behalf)…"
        autocomplete="off"
        spellcheck="false"
        hidden
      />
      <button id="open-btn" type="button" hidden>Open</button>
      <span id="status">Idle</span>
    </header>
    <div id="search-bar" hidden>
      <input
        id="search-input"
        type="text"
        placeholder="Find in log…"
        autocomplete="off"
        spellcheck="false"
      />
      <select id="search-mode" title="Search mode">
        <option value="substring" selected>substring</option>
        <option value="query">query</option>
      </select>
      <span id="search-count">0 / 0</span>
      <button id="search-prev" type="button" title="Previous (Shift+Enter)">&#x25B2;</button>
      <button id="search-next" type="button" title="Next (Enter)">&#x25BC;</button>
      <button id="search-close" type="button" title="Close (Esc)">&times;</button>
    </div>
    <main id="viewport" tabindex="0">
      <div id="spacer">
        <div id="rows"></div>
      </div>
    </main>
    <script type="module" src="/viewer.js"></script>
  </body>
</html>

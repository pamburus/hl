name: ci

on:
  push:
    branches: [master, release/**]
  pull_request:
    branches: [master, release/**]

permissions:
  contents: read
  pull-requests: write
  actions: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Validate YAML configs
        uses: cardinalby/schema-validator-action@v3
        with:
          file: "etc/defaults/config*.yaml"
          schema: "schema/json/config.schema.json"

      - name: Validate YAML themes
        uses: cardinalby/schema-validator-action@v3
        with:
          file: "etc/defaults/themes/*.yaml"
          schema: "schema/json/theme.schema.json"

      - name: Setup taplo
        uses: uncenter/setup-taplo@v1

      - name: Validate TOML configs and themes
        run: taplo check

      - name: Install latest nightly
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly
          components: rustfmt

      - name: Check formatting
        run: cargo +nightly fmt --verbose --all --check

      - name: markdownlint-cli2-action
        uses: DavidAnson/markdownlint-cli2-action@v18.0.0

      - name: Build
        run: cargo build --verbose --benches --workspace

      - name: Run tests
        run: cargo test --verbose --workspace

      - name: Run executable
        run: cargo run

  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install latest toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Generate code coverage
        run: |
          make coverage

      - name: Upload coverage to codecov.io
        uses: codecov/codecov-action@v5
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  test-nix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Cache Nix store
        uses: cachix/cachix-action@v15
        with:
          name: hl
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Check Nix formatting
        run: |
          nix fmt
          if ! git diff --exit-code; then
            echo "Nix files are not formatted correctly"
            exit 1
          fi

      - name: Run nix flake check
        run: nix flake check --print-build-logs --all-systems

      - name: Build all package variants
        run: |
          nix build --print-build-logs .#hl
          nix build --print-build-logs .#hl-debug
          nix build --print-build-logs .#hl-static
          nix build --print-build-logs .#hl-minimal

      - name: Test development shell
        run: |
          nix develop -c cargo --version
          nix develop -c rustc --version
          nix develop -c rust-analyzer --version

      - name: Run application tests
        run: |
          nix develop -c cargo test --workspace
          nix run -- --version
          nix run -- --help

  test-nix-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Cache Nix store
        uses: cachix/cachix-action@v15
        with:
          name: hl
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build for macOS
        run: nix build --print-build-logs

      - name: Test macOS build
        run: nix run -- --version
